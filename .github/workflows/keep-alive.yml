name: Keep Alive - MTP (Marathon Training Planner)

on:
  schedule:
    # 6時間ごと (UTC 0:00, 6:00, 12:00, 18:00 = JST 9:00, 15:00, 21:00, 3:00)
    - cron: '0 */6 * * *'
  # 手動実行（動作確認・緊急起動用）
  workflow_dispatch:

jobs:
  wake-up:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Wake up MTP App
        run: |
          cat > wake.js << 'EOF'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            const url = 'https://ai-marathon-coach.streamlit.app/';
            console.log(`[${new Date().toISOString()}] Accessing ${url} ...`);
            try {
              // スリープ中は networkidle にならないため domcontentloaded を使用
              // タイムアウトしても wake ボタン検知を続けるため catch で握りつぶす
              await page.goto(url, { timeout: 30000, waitUntil: 'domcontentloaded' }).catch(() => {});
              // SPA描画を待つ（スリープページはJSで描画される）20秒に増加
              await page.waitForTimeout(20000);

              // デバッグ：ページタイトル・URL・HTML先頭500文字を記録
              const title = await page.title().catch(() => '');
              const currentUrl = page.url();
              console.log(`DEBUG: title="${title}", url="${currentUrl}"`);
              const htmlContent = await page.content().catch(() => '');
              console.log(`DEBUG: html_snippet="${htmlContent.slice(0, 500)}"`);

              // スリープ検出1：HTMLコンテンツにスリープキーワードがあるか
              const sleepKeywords = ['gone to sleep', 'asleep', 'get this app back up', 'wake up this app'];
              let isSleeping = sleepKeywords.some(kw => htmlContent.toLowerCase().includes(kw));

              // スリープ検出2：ページタイトルで判定
              const titleLower = title.toLowerCase();
              if (titleLower.includes('sleep') || titleLower.includes('asleep')) {
                isSleeping = true;
              }

              // スリープ検出3：メインフレームのボタンセレクター
              let wakeBtn = null;
              const mainBtn = page.getByRole('button', { name: /get this app back up/i });
              if (await mainBtn.isVisible({ timeout: 3000 }).catch(() => false)) {
                isSleeping = true;
                wakeBtn = mainBtn;
              }

              // スリープ検出4：iframeの中もチェック（Streamlitがiframe経由でスリープUIを表示する場合）
              if (!wakeBtn) {
                for (const frame of page.frames()) {
                  const btn = frame.getByRole('button', { name: /get this app back up/i });
                  if (await btn.isVisible({ timeout: 2000 }).catch(() => false)) {
                    isSleeping = true;
                    wakeBtn = btn;
                    break;
                  }
                }
              }

              console.log(`DEBUG: isSleeping=${isSleeping}, wakeBtnFound=${!!wakeBtn}`);

              if (isSleeping) {
                console.log('STATUS: SLEEPING - Clicking wake-up button...');
                if (wakeBtn) {
                  await wakeBtn.click();
                } else {
                  // フォールバック：最初のボタンをクリック
                  await page.locator('button').first().click({ timeout: 5000 }).catch(e => console.log('Fallback click failed:', e.message));
                }
                await page.waitForTimeout(90000);
                console.log('Wake-up request sent. App should be starting.');
                process.exitCode = 1; // GitHub にメール通知させる
              } else {
                console.log('STATUS: RUNNING - No action needed.');
              }
            } catch (e) {
              console.log('ERROR:', e.message);
            } finally {
              await browser.close();
            }
          })();
          EOF
          node wake.js
