name: Keep Alive - MTP (Marathon Training Planner)

on:
  schedule:
    # 6時間ごと (UTC 0:00, 6:00, 12:00, 18:00 = JST 9:00, 15:00, 21:00, 3:00)
    - cron: '0 */6 * * *'
  # 手動実行（動作確認・緊急起動用）
  workflow_dispatch:

jobs:
  wake-up:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Wake up MTP App
        run: |
          cat > wake.js << 'EOF'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            const url = 'https://ai-marathon-coach.streamlit.app/';
            console.log(`[${new Date().toISOString()}] Accessing ${url} ...`);
            try {
              // スリープ中は networkidle にならないため domcontentloaded を使用
              // タイムアウトしても wake ボタン検知を続けるため catch で握りつぶす
              await page.goto(url, { timeout: 30000, waitUntil: 'domcontentloaded' }).catch(() => {});
              // SPA描画を待つ（スリープページはJSで描画される）
              await page.waitForTimeout(20000);

              const title = await page.title().catch(() => '');
              const currentUrl = page.url();
              const htmlContent = await page.content().catch(() => '');
              console.log(`DEBUG: title="${title}", url="${currentUrl}"`);

              // スリープ検出1（新仕様）：not_found にリダイレクトされたらスリープ
              // Streamlit Cloud の仕様変更でスリープ中は /errors/not_found にリダイレクトされる
              const isNotFound = currentUrl.includes('/errors/not_found') || title.includes('Not found');

              // スリープ検出2（旧仕様）：タイトル・HTML キーワード・ボタンで判定
              const titleLower = title.toLowerCase();
              const isOldStyleSleep =
                titleLower.includes('sleep') || titleLower.includes('asleep') ||
                ['gone to sleep', 'asleep', 'get this app back up'].some(kw => htmlContent.toLowerCase().includes(kw));

              let isSleeping = isNotFound || isOldStyleSleep;
              console.log(`DEBUG: isSleeping=${isSleeping}, isNotFound=${isNotFound}, isOldStyleSleep=${isOldStyleSleep}`);

              // 旧仕様のウェイクボタンがある場合はクリック
              if (isSleeping) {
                const wakeBtn = page.getByRole('button', { name: /get this app back up/i });
                if (await wakeBtn.isVisible({ timeout: 3000 }).catch(() => false)) {
                  await wakeBtn.click();
                  console.log('Clicked wake button (old-style).');
                } else if (isNotFound) {
                  // 新仕様：元のURLに再アクセスしてウェイクアップを開始する
                  console.log('Re-accessing app URL to trigger wake-up (new-style)...');
                  await page.goto(url, { timeout: 60000, waitUntil: 'domcontentloaded' }).catch(() => {});
                }
              }

              if (isSleeping) {
                console.log('STATUS: SLEEPING - Wake-up triggered. Waiting for boot...');
                await page.waitForTimeout(90000);
                console.log('Wake-up request sent. App should be starting.');
                process.exitCode = 1; // GitHub にメール通知させる
              } else {
                console.log('STATUS: RUNNING - No action needed.');
              }
            } catch (e) {
              console.log('ERROR:', e.message);
            } finally {
              await browser.close();
            }
          })();
          EOF
          node wake.js
